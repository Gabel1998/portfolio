name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test backend
        working-directory: backend
        run: mvn clean verify -B

  push-images:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/gabel1998/portfolio/backend:latest
            ghcr.io/gabel1998/portfolio/backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/gabel1998/portfolio/frontend:latest
            ghcr.io/gabel1998/portfolio/frontend:${{ github.sha }}

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: push-images
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            # Ensure repo is cloned for config files (docker-compose.yml, nginx, workflows)
            if [ ! -d "/opt/portfolio/.git" ]; then
              git clone https://Gabel1998:${{ secrets.GHCR_TOKEN }}@github.com/Gabel1998/portfolio.git /opt/portfolio-repo
              # Copy config files into existing portfolio dir (preserve any local state)
              mkdir -p /opt/portfolio
              cp /opt/portfolio-repo/docker-compose.yml /opt/portfolio/
              cp -r /opt/portfolio-repo/nginx /opt/portfolio/
              cp -r /opt/portfolio-repo/.github /opt/portfolio/
              # Initialize as git repo for future pulls
              cd /opt/portfolio
              git init
              git remote add origin https://Gabel1998:${{ secrets.GHCR_TOKEN }}@github.com/Gabel1998/portfolio.git
              git fetch origin main
              git reset --hard origin/main
              rm -rf /opt/portfolio-repo
            else
              cd /opt/portfolio
              git pull origin main
            fi

            cd /opt/portfolio

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u Gabel1998 --password-stdin

            docker compose pull
            docker compose up -d
            docker compose restart nginx

            docker image prune -f

            echo "Deploy complete"

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for services to start
        run: sleep 60

      - name: Check health endpoint
        run: |
          STATUS=$(curl -skL -o /dev/null -w "%{http_code}" https://${{ secrets.DROPLET_HOST }}/api/health || true)
          if [ "$STATUS" = "200" ]; then
            echo "Health check passed (HTTP $STATUS)"
          else
            echo "Health check failed (HTTP $STATUS)"
            exit 1
          fi
