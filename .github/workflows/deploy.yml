name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test backend
        working-directory: backend
        run: mvn clean verify -B

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit Test Results
          path: backend/target/surefire-reports/*.xml
          reporter: java-junit

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/target/site/jacoco/
          retention-days: 14

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 14

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install linters
        run: npm install -g htmlhint stylelint stylelint-config-standard eslint

      - name: Lint HTML
        working-directory: frontend
        continue-on-error: true
        run: htmlhint "**/*.html"

      - name: Create stylelint config
        working-directory: frontend
        run: echo '{"extends":"stylelint-config-standard"}' > .stylelintrc.json

      - name: Lint CSS
        working-directory: frontend
        continue-on-error: true
        run: stylelint "css/**/*.css"

      - name: Create ESLint config
        working-directory: frontend
        run: echo '{"env":{"browser":true,"es2021":true},"rules":{"no-unused-vars":"warn","no-undef":"warn"}}' > .eslintrc.json

      - name: Lint JavaScript
        working-directory: frontend
        continue-on-error: true
        run: eslint "js/**/*.js"

  push-images:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: [build-and-test, lint-frontend]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/gabel1998/portfolio/backend:latest
            ghcr.io/gabel1998/portfolio/backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/gabel1998/portfolio/frontend:latest
            ghcr.io/gabel1998/portfolio/frontend:${{ github.sha }}

      - name: Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/gabel1998/portfolio/backend:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/gabel1998/portfolio/frontend:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: push-images
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd /opt/portfolio

            # Sync repo for config files (docker-compose.yml, nginx, workflows)
            if [ -d ".git" ]; then
              git pull origin main
            else
              git init
              git remote add origin https://Gabel1998:${{ secrets.GHCR_TOKEN }}@github.com/Gabel1998/portfolio.git
              git fetch origin main
              git reset --hard origin/main
            fi

            # Remove override file if present (production uses image: not build:)
            rm -f docker-compose.override.yml

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u Gabel1998 --password-stdin

            docker compose pull
            docker compose up -d --force-recreate
            docker image prune -f

            echo "Deploy complete"

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for services to start
        run: sleep 90

      - name: Check health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 http://${{ secrets.DROPLET_HOST }}/api/health || true)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ]; then
            echo "Health check passed (HTTP $STATUS — service is responding)"
          else
            echo "Health check failed (HTTP $STATUS)"
            exit 1
          fi
