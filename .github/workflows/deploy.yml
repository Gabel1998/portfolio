name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  checks: write

# Serialize deploys to the single droplet: never run two `docker compose` deploys
# against the same host at once (merging several PRs would otherwise fire parallel
# deploys that fight over the same daemon).
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test backend
        working-directory: backend
        run: mvn clean verify -B

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit Test Results
          path: backend/target/surefire-reports/*.xml
          reporter: java-junit

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/target/site/jacoco/
          retention-days: 14

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 14

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install linters
        run: npm install -g htmlhint stylelint stylelint-config-standard eslint

      - name: Lint HTML
        working-directory: frontend
        continue-on-error: true
        run: htmlhint "**/*.html"

      - name: Create stylelint config
        working-directory: frontend
        run: echo '{"extends":"stylelint-config-standard","rules":{"selector-class-pattern":"^[a-z][a-z0-9]*(?:-[a-z0-9]+)*(?:__[a-z0-9]+(?:-[a-z0-9]+)*)?(?:--[a-z0-9]+(?:-[a-z0-9]+)*)?$","color-function-notation":null,"color-hex-length":null,"alpha-value-notation":null,"color-function-alias-notation":null,"media-feature-range-notation":null}}' > .stylelintrc.json

      - name: Lint CSS
        working-directory: frontend
        continue-on-error: true
        run: stylelint "css/**/*.css"

      - name: Create ESLint config
        working-directory: frontend
        run: |
          cat > eslint.config.js << 'ESLINTEOF'
          export default [{ languageOptions: { globals: { window: "readonly", document: "readonly", console: "readonly", fetch: "readonly", location: "readonly", setTimeout: "readonly", clearTimeout: "readonly", HTMLElement: "readonly", customElements: "readonly", navigator: "readonly", requestAnimationFrame: "readonly", cancelAnimationFrame: "readonly", IntersectionObserver: "readonly", MutationObserver: "readonly", URLSearchParams: "readonly" }, ecmaVersion: 2021, sourceType: "module" }, rules: { "no-unused-vars": "warn" } }];
          ESLINTEOF

      - name: Lint JavaScript
        working-directory: frontend
        continue-on-error: true
        run: eslint "js/**/*.js"

  push-images:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: [build-and-test, lint-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/gabel1998/portfolio/backend:latest
            ghcr.io/gabel1998/portfolio/backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/gabel1998/portfolio/frontend:latest
            ghcr.io/gabel1998/portfolio/frontend:${{ github.sha }}

      - name: Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/gabel1998/portfolio/backend:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/gabel1998/portfolio/frontend:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: push-images
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          # Pulling the observability images on a small droplet can exceed the
          # action's 10-minute default; allow time for pull + health gate + rollback.
          command_timeout: 30m
          script: |
            cd /opt/portfolio

            # Sync repo for config files (docker-compose.yml, nginx, workflows).
            # The repo is public, so git needs no credentials — the GHCR_TOKEN is
            # only used for `docker login` below. (Avoids persisting the token in
            # the server's .git/config, which a token-in-remote-URL would do.)
            if [ -d ".git" ]; then
              git pull origin main
            else
              git init
              git remote add origin https://github.com/Gabel1998/portfolio.git
              git fetch origin main
              git reset --hard origin/main
            fi

            # Remove override file if present (production uses image: not build:)
            rm -f docker-compose.override.yml

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u Gabel1998 --password-stdin

            # Snapshot currently-running images so we can roll back an unhealthy release
            BACKEND=ghcr.io/gabel1998/portfolio/backend
            FRONTEND=ghcr.io/gabel1998/portfolio/frontend
            docker tag $BACKEND:latest $BACKEND:rollback 2>/dev/null || echo "No previous backend image to snapshot"
            docker tag $FRONTEND:latest $FRONTEND:rollback 2>/dev/null || echo "No previous frontend image to snapshot"

            # Deploy the new release
            docker compose pull
            docker compose up -d --force-recreate

            # Health gate: poll the live endpoint; only HTTP 200 counts as healthy.
            # 48 x 5s = 4 min — the Spring Boot backend needs ~2 min to boot on the
            # 1-vCPU/2 GB droplet when the whole stack is force-recreated at once, so
            # a tighter gate false-fails and triggers a needless rollback.
            healthy=0
            for i in $(seq 1 48); do
              sleep 5
              CODE=$(curl -sk -o /dev/null -w "%{http_code}" --max-time 5 https://localhost/api/health || true)
              echo "Health attempt $i: HTTP $CODE"
              if [ "$CODE" = "200" ]; then healthy=1; break; fi
            done

            if [ "$healthy" != "1" ]; then
              echo "New release failed health check — rolling back to previous images"
              docker tag $BACKEND:rollback $BACKEND:latest 2>/dev/null || true
              docker tag $FRONTEND:rollback $FRONTEND:latest 2>/dev/null || true
              docker compose up -d --force-recreate
              exit 1
            fi

            docker image prune -f
            echo "Deploy healthy and complete"

  health-check:
    name: External Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Verify the public endpoint returns 200
        run: |
          for i in $(seq 1 6); do
            STATUS=$(curl -skL -o /dev/null -w "%{http_code}" --max-time 10 https://${{ secrets.DROPLET_HOST }}/api/health || true)
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "External smoke test passed"
              exit 0
            fi
            sleep 10
          done
          echo "External smoke test failed — endpoint did not return 200"
          exit 1
