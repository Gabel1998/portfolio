name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  checks: write

jobs:
  build-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test
        working-directory: backend
        run: mvn clean verify -B

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit Test Results
          path: backend/target/surefire-reports/*.xml
          reporter: java-junit

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/target/site/jacoco/
          retention-days: 7

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 7

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install linters
        run: npm install -g htmlhint stylelint stylelint-config-standard eslint

      - name: Lint HTML
        working-directory: frontend
        continue-on-error: true
        run: htmlhint "**/*.html"

      - name: Create stylelint config
        working-directory: frontend
        run: echo '{"extends":"stylelint-config-standard"}' > .stylelintrc.json

      - name: Lint CSS
        working-directory: frontend
        continue-on-error: true
        run: stylelint "css/**/*.css"

      - name: Create ESLint config
        working-directory: frontend
        run: |
          cat > eslint.config.js << 'ESLINTEOF'
          export default [{ languageOptions: { globals: { window: "readonly", document: "readonly", console: "readonly", fetch: "readonly", location: "readonly", setTimeout: "readonly", clearTimeout: "readonly", HTMLElement: "readonly", customElements: "readonly", navigator: "readonly", requestAnimationFrame: "readonly", cancelAnimationFrame: "readonly", IntersectionObserver: "readonly", MutationObserver: "readonly", URLSearchParams: "readonly" }, ecmaVersion: 2021, sourceType: "module" }, rules: { "no-unused-vars": "warn" } }];
          ESLINTEOF

      - name: Lint JavaScript
        working-directory: frontend
        continue-on-error: true
        run: eslint "js/**/*.js"

  docker-build:
    name: Verify Docker Build
    runs-on: ubuntu-latest
    needs: [build-backend, lint-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t portfolio-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t portfolio-frontend:ci ./frontend

      - name: Scan backend image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: portfolio-backend:ci
          format: table
          severity: CRITICAL,HIGH

      - name: Scan frontend image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: portfolio-frontend:ci
          format: table
          severity: CRITICAL,HIGH
