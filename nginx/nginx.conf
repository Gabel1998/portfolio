upstream backend {
    server portfolio-backend:8080;
}

upstream frontend {
    server portfolio-frontend:80;
}

upstream raidfines-frontend {
    server raidfines-frontend:80;
}

upstream raidfines-backend {
    server raidfines-backend:8080;
}

upstream webcrawler-frontend {
    server webcrawler-frontend:80;
}

upstream webcrawler-backend {
    server webcrawler-backend:8080;
}

upstream beskyttelsesrum {
    server beskyttelsesrum:8080;
}

# HTTP — redirect to HTTPS + certbot challenge
server {
    listen 80;
    server_name andreasgabel.dk www.andreasgabel.dk;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name andreasgabel.dk www.andreasgabel.dk;

    ssl_certificate /etc/letsencrypt/live/andreasgabel.dk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/andreasgabel.dk/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Frontend (SPA)
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Raid Fines Showroom ---
    location /raidfines/ {
        proxy_pass http://raidfines-frontend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /raidfines/api/ {
        proxy_pass http://raidfines-backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Web Crawler Showroom ---
    location /webcrawler/ {
        proxy_pass http://webcrawler-frontend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /webcrawler/api/ {
        proxy_pass http://webcrawler-backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # --- Beskyttelsesrum Showroom ---
    location /beskyttelsesrum/ {
        proxy_pass http://beskyttelsesrum/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
