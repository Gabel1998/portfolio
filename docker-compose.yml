services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - portfolio-frontend
      - portfolio-backend
    networks:
      - frontend

  portfolio-frontend:
    build: ./frontend
    expose:
      - "80"
    networks:
      - frontend

  portfolio-backend:
    build: ./backend
    expose:
      - "8080"
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
    networks:
      - frontend

  # --- Project showrooms ---

  raidfines-frontend:
    image: ghcr.io/gabel1998/raid-fines/frontend:showroom
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - frontend

  raidfines-backend:
    image: ghcr.io/gabel1998/raid-fines/backend:showroom
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - SPRING_PROFILES_ACTIVE=showroom
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
    networks:
      - frontend

  # --- Web Crawler Showroom ---

  webcrawler-frontend:
    image: ghcr.io/gabel1998/webcrawler/frontend:showroom
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - frontend

  webcrawler-backend:
    image: ghcr.io/gabel1998/webcrawler/backend:showroom
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - SPRING_PROFILES_ACTIVE=showroom
      - SELENIUM_REMOTE_URL=http://selenium-chrome:4444/wd/hub
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    networks:
      - frontend

  selenium-chrome:
    image: selenium/standalone-chrome:latest
    restart: unless-stopped
    shm_size: '2g'
    expose:
      - "4444"
    networks:
      - frontend

  # --- Beskyttelsesrum Showroom ---

  beskyttelsesrum:
    image: ghcr.io/gabel1998/beskyttelsesrum:showroom
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - SPRING_PROFILES_ACTIVE=showroom
    networks:
      - frontend

networks:
  frontend:
