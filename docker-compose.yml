services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - portfolio-frontend
      - portfolio-backend
    restart: unless-stopped
    networks:
      - frontend

  portfolio-frontend:
    image: ghcr.io/gabel1998/portfolio/frontend:latest
    expose:
      - "80"
    networks:
      - frontend

  portfolio-backend:
    image: ghcr.io/gabel1998/portfolio/backend:latest
    expose:
      - "8080"
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    volumes:
      - ./docker-compose.yml:/app/docker-compose.yml:ro
      - ./nginx/nginx.conf:/app/nginx.conf:ro
      - ./.github/workflows:/app/workflows/portfolio:ro
    networks:
      - frontend

  # --- Project showrooms ---

  raidfines-frontend:
    image: ghcr.io/gabel1998/raid-fines/frontend:showroom
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - frontend

  raidfines-backend:
    image: ghcr.io/gabel1998/raid-fines/backend:showroom
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - SPRING_PROFILES_ACTIVE=showroom
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
    networks:
      - frontend

  # --- Web Crawler Showroom ---

  webcrawler-frontend:
    image: ghcr.io/gabel1998/webcrawler/frontend:showroom
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - frontend

  webcrawler-backend:
    image: ghcr.io/gabel1998/webcrawler/backend:showroom
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - SPRING_PROFILES_ACTIVE=showroom
      - SELENIUM_REMOTE_URL=http://selenium-chrome:4444/wd/hub
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    networks:
      - frontend

  selenium-chrome:
    image: selenium/standalone-chrome:latest
    restart: unless-stopped
    shm_size: '2g'
    expose:
      - "4444"
    networks:
      - frontend

  # --- Talent API ---

  talent-api:
    image: ghcr.io/gabel1998/talent-api:sha-95c5265137530e7faf8c968353a184463251c1b6
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - SPRING_PROFILES_ACTIVE=production
    networks:
      - frontend

  # --- Beskyttelsesrum Showroom ---

  beskyttelsesrum:
    image: ghcr.io/gabel1998/beskyttelsesrum:showroom
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - SPRING_PROFILES_ACTIVE=showroom
    networks:
      - frontend

  # --- Observability ---

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    expose:
      - "9090"
    networks:
      - frontend

  alertmanager:
    image: prom/alertmanager:latest
    restart: unless-stopped
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    expose:
      - "9093"
    networks:
      - frontend

  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
      - '--collector.textfile.directory=/var/lib/node_exporter/textfile_collector'
    volumes:
      - /:/host:ro,rslave
      # Backup job writes backup_last_success_timestamp_seconds here (see Ansible)
      - /var/lib/node_exporter/textfile_collector:/var/lib/node_exporter/textfile_collector:ro
    expose:
      - "9100"
    networks:
      - frontend

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    expose:
      - "8080"
    networks:
      - frontend

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_SERVER_ROOT_URL=https://andreasgabel.dk/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    expose:
      - "3000"
    networks:
      - frontend

networks:
  frontend:

volumes:
  prometheus-data:
  grafana-data:
