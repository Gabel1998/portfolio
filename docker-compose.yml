services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - portfolio-frontend
      - portfolio-backend
    networks:
      - frontend

  portfolio-frontend:
    build: ./frontend
    expose:
      - "80"
    networks:
      - frontend

  portfolio-backend:
    build: ./backend
    expose:
      - "8080"
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
    networks:
      - frontend

  # --- Project showrooms ---

  raidfines-frontend:
    image: ghcr.io/gabel1998/raid-fines/frontend:showroom
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - frontend

  raidfines-backend:
    image: ghcr.io/gabel1998/raid-fines/backend:showroom
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - SPRING_PROFILES_ACTIVE=showroom
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
    networks:
      - frontend

networks:
  frontend:
