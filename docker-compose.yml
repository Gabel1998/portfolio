services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - portfolio-frontend
      - portfolio-backend
    networks:
      - frontend

  portfolio-frontend:
    build: ./frontend
    expose:
      - "80"
    networks:
      - frontend

  portfolio-backend:
    build: ./backend
    expose:
      - "8080"
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
    networks:
      - frontend

  # --- Project showrooms ---
  # Add new project services below. Each project gets:
  #   - an app container (image from GHCR)
  #   - a db container (internal network only)
  #
  # Example:
  # raidfines-app:
  #   image: ghcr.io/gabel1998/raidfines:latest
  #   expose: ["8081"]
  #   depends_on: [raidfines-db]
  #   networks: [frontend, raidfines-internal]
  #
  # raidfines-db:
  #   image: mysql:8
  #   environment:
  #     MYSQL_ROOT_PASSWORD: ${DB_PASSWORD_RAIDFINES}
  #     MYSQL_DATABASE: raidfines
  #   networks: [raidfines-internal]

networks:
  frontend:
