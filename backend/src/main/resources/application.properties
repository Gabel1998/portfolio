server.port=8080

# CORS — allow frontend origin
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# Infrastructure — workflow files for pipeline visualization
# In production, mounted via docker-compose volumes
infrastructure.workflows-path=${WORKFLOWS_PATH:/app/workflows}
# GitHub token for higher API rate limits (5000/hour vs 60/hour)
infrastructure.github-token=${GITHUB_TOKEN:}
