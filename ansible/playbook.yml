---
- name: Configure the portfolio droplet
  hosts: portfolio
  become: true

  tasks:
    # =====================================================================
    # Base packages + automatic security updates
    # =====================================================================
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - ufw
          - unattended-upgrades
        state: present

    - name: Ensure the compose directory exists
      ansible.builtin.file:
        path: "{{ compose_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Enable unattended security upgrades
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";
        owner: root
        group: root
        mode: "0644"

    # =====================================================================
    # Docker Engine + Compose plugin (official apt repo)
    # =====================================================================
    - name: Create the apt keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add the Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add the Docker apt repository
      ansible.builtin.deb822_repository:
        name: docker
        types: [deb]
        uris: https://download.docker.com/linux/ubuntu
        suites: "{{ ansible_distribution_release }}"
        components: [stable]
        architectures: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"
        signed_by: /etc/apt/keyrings/docker.asc
        enabled: true
        state: present

    - name: Install Docker Engine and the Compose plugin
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Ensure Docker is started and enabled
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    # =====================================================================
    # Host firewall (ufw) — defense in depth alongside the DO cloud firewall.
    # The allow rules run BEFORE enabling so an active SSH session is never cut.
    # =====================================================================
    - name: Allow SSH through ufw
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp

    - name: Allow HTTP through ufw
      community.general.ufw:
        rule: allow
        port: "80"
        proto: tcp

    - name: Allow HTTPS through ufw
      community.general.ufw:
        rule: allow
        port: "443"
        proto: tcp

    - name: Enable ufw with a default-deny inbound policy
      community.general.ufw:
        state: enabled
        policy: deny
        direction: incoming

    # =====================================================================
    # certbot / Let's Encrypt auto-renewal.
    #
    # This sets up renewal infrastructure AROUND the existing certificate — it
    # does NOT obtain or modify the live cert. Renewal uses the webroot method,
    # which matches the /.well-known/acme-challenge/ location in nginx.conf.
    #
    # Dependency: the nginx container must serve {{ certbot_webroot }} — add
    #   - {{ certbot_webroot }}:{{ certbot_webroot }}:ro
    # to the nginx service volumes in docker-compose.yml.
    #
    # To issue a brand-new cert on a fresh host, run with: --tags certbot_issue
    # =====================================================================
    - name: Install certbot
      ansible.builtin.apt:
        name: certbot
        state: present

    - name: Ensure the ACME webroot exists
      ansible.builtin.file:
        path: "{{ certbot_webroot }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Install the renewal deploy-hook that reloads the nginx container
      ansible.builtin.copy:
        dest: /etc/letsencrypt/renewal-hooks/deploy/reload-nginx.sh
        mode: "0755"
        content: |
          #!/usr/bin/env bash
          # Reload nginx (running under Docker Compose) so it serves the renewed cert.
          set -euo pipefail
          docker compose -f {{ compose_dir }}/docker-compose.yml exec -T nginx nginx -s reload

    - name: Ensure the certbot renewal timer is enabled
      ansible.builtin.systemd:
        name: certbot.timer
        state: started
        enabled: true

    # ---- Opt-in: issue the certificate (fresh hosts only; never runs by default) ----
    - name: Obtain the certificate via webroot
      ansible.builtin.command:
        cmd: >-
          certbot certonly --webroot -w {{ certbot_webroot }}
          -d {{ domain }} -d www.{{ domain }}
          --email {{ certbot_email }} --agree-tos --non-interactive
          --keep-until-expiring
        creates: "/etc/letsencrypt/live/{{ domain }}/fullchain.pem"
      tags:
        - certbot_issue
        - never
